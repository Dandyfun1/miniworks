<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SchoolHub</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase (MODULE) -->
  <script type="module" src="script.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>SchoolHub</h1>
  <p>Enter your name</p>
  <input id="usernameInput" placeholder="Your name">
  <button id="enterBtn">Enter</button>
</div>

<!-- ICON BAR -->
<div id="iconBar" class="hidden">
  <div class="icon" id="weatherIcon">🌦</div>
  <div class="icon" id="calendarIcon">📅</div>
</div>

<!-- WEATHER POPUP -->
<div id="weather" class="popup hidden draggable">
  <div class="popupHeader">Weather</div>
  <iframe
    src="https://www.meteoblue.com/en/weather/widget/daily/vitoria-gasteiz_spain_3104499?days=3&tempunit=C"
    loading="lazy">
  </iframe>
</div>

<!-- CALENDAR POPUP -->
<div id="calendar" class="popup hidden draggable">
  <div class="popupHeader">Shared Calendar</div>
  <input id="noteInput" placeholder="Add note">
  <button id="addNoteBtn">Add</button>
  <ul id="notes"></ul>
</div>

</body>
</html>
