<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Personal Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>
    <div id="bg-overlay"></div>
    
    <nav class="navbar">
        <div class="nav-left">
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
            <label for="bg-upload" class="custom-file-upload">
                <i class="fas fa-image"></i> Change BG
            </label>
            <input type="file" id="bg-upload" accept="image/*">
        </div>
        <div class="nav-icons">
            <div class="icon-btn" id="open-clock"><i class="fas fa-clock"></i></div>
            <div class="icon-btn" id="open-calendar"><i class="fas fa-calendar-alt"></i></div>
            <div class="icon-btn" id="open-weather"><i class="fas fa-cloud-sun"></i></div>
        </div>
    </nav>

    <main class="container">
        <section class="upload-section">
            <h2><i class="fas fa-file-upload"></i> File Manager</h2>
            <div class="upload-controls">
                <input type="file" id="file-input" multiple>
                <input type="text" id="gdoc-link" placeholder="Paste Google Doc/Slides Link">
                <button onclick="addGoogleDoc()">Add Google Doc</button>
            </div>
            <div id="file-list" class="file-grid"></div>
        </section>
    </main>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-hide">
        <div class="modal">
            <button class="close-modal">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Templates (Hidden) -->
    <template id="temp-clock">
        <div class="analog-clock">
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
            <div class="center-dot"></div>
        </div>
        <div id="digital-time"></div>
    </template>

    <template id="temp-calendar">
        <div class="calendar-container">
            <div class="cal-header">
                <button id="prev-month">&lt;</button>
                <h3 id="month-display"></h3>
                <button id="next-month">&gt;</button>
            </div>
            <div class="cal-grid" id="calendar-days"></div>
            <div class="event-editor">
                <input type="text" id="event-text" placeholder="Add event for selected day...">
                <button onclick="saveEvent()">Save Event</button>
            </div>
        </div>
    </template>

    <template id="temp-weather">
        <div class="weather-widget">
            <h3>Vitoria-Gasteiz, ES</h3>
            <iframe src="https://www.aemet.es" 
                    width="100%" height="250" frameborder="0" scrolling="no"></iframe>
            <p><small>Data provided by [AEMET](https://www.aemet.es/en/eltiempo/widgets/municipios/vitoria-gasteiz-id01059)</small></p>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
