<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Glass Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>
    <div id="bg-layer"></div>

    <!-- Header / Settings -->
    <header class="glass-nav">
        <div class="brand">MY DASHBOARD</div>
        <div class="nav-controls">
            <button id="theme-toggle" class="control-btn"><i class="fas fa-moon"></i></button>
            <label for="bg-upload" class="control-btn"><i class="fas fa-image"></i></button>
            <input type="file" id="bg-upload" accept="image/*" hidden>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="dashboard-main">
        <section class="file-manager glass-card">
            <h2><i class="fas fa-folder-tree"></i> File Manager</h2>
            
            <div id="drop-zone" class="drop-area">
                <i class="fas fa-cloud-upload-alt fa-3x"></i>
                <p>Drag & Drop local files here or <span>Browse</span></p>
                <input type="file" id="file-input-hidden" multiple hidden>
            </div>

            <div class="google-tools">
                <input type="text" id="glink" placeholder="Paste Google Doc/Slide link...">
                <button onclick="addGoogleAsset()">Add Asset</button>
            </div>

            <div id="file-grid" class="file-display-grid"></div>
        </section>
    </main>

    <!-- Floating Dock -->
    <div class="floating-dock">
        <div class="dock-icon" onclick="togglePopup('clock-pop')"><i class="fas fa-clock"></i></div>
        <div class="dock-icon" onclick="togglePopup('cal-pop')"><i class="fas fa-calendar-days"></i></div>
        <div class="dock-icon" onclick="togglePopup('weather-pop')"><i class="fas fa-cloud-sun"></i></div>
    </div>

    <!-- Widget Popups -->
    <div id="clock-pop" class="popup glass-card">
        <div class="popup-header"><span>Analog Clock</span><button class="close-btn" onclick="togglePopup('clock-pop')">&times;</button></div>
        <div class="analog-clock">
            <div class="hand hr" id="hour-hand"></div>
            <div class="hand min" id="min-hand"></div>
            <div class="hand sec" id="sec-hand"></div>
        </div>
        <div id="digital-clock">00:00:00</div>
    </div>

    <div id="cal-pop" class="popup glass-card">
        <div class="popup-header"><span>Calendar</span><button class="close-btn" onclick="togglePopup('cal-pop')">&times;</button></div>
        <div class="cal-nav">
            <button onclick="moveMonth(-1)">&lt;</button>
            <h4 id="month-name"></h4>
            <button onclick="moveMonth(1)">&gt;</button>
        </div>
        <div id="calendar-days" class="days-grid"></div>
        <div class="event-form">
            <input type="text" id="event-input" placeholder="Type event...">
            <button onclick="saveEvent()">Pin</button>
        </div>
    </div>

    <div id="weather-pop" class="popup glass-card">
        <div class="popup-header"><span>Vitoria-Gasteiz</span><button class="close-btn" onclick="togglePopup('weather-pop')">&times;</button></div>
        <iframe src="https://www.aemet.es" width="100%" height="220" style="border-radius:10px; border:none;"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
