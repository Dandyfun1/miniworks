<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h1>Smart Dashboard</h1>

<div class="controls">

<button id="themeToggle">🌙 / ☀️</button>

<label class="bgBtn">
Background
<input type="file" id="bgUpload" accept="image/*">
</label>

</div>

</header>

<main class="grid">

<!-- CLOCK -->

<section class="widget">

<h2>Clock</h2>

<canvas id="clockCanvas" width="200" height="200"></canvas>

<div id="digitalClock"></div>

</section>

<!-- WEATHER -->

<section class="widget">

<h2>Weather</h2>

<div id="weather"></div>

</section>

<!-- CALENDAR -->

<section class="widget">

<h2>Calendar</h2>

<div class="calendarNav">

<button id="prevMonth">◀</button>

<span id="monthYear"></span>

<button id="nextMonth">▶</button>

</div>

<div id="calendar"></div>

<div class="eventPanel">

<input type="date" id="eventDate">

<input type="text" id="eventText" placeholder="Event name">

<button id="addEvent">Add Event</button>

</div>

</section>

<!-- FILE MANAGER -->

<section class="widget fileManager">

<h2>File Manager</h2>

<div id="dropZone">Drop files here</div>

<input type="file" id="fileUpload" multiple>

<div id="filePreview"></div>

<h3>Add Document Link</h3>

<input id="docLink" placeholder="Paste Google / Office link">

<button id="addDoc">Add</button>

<div id="docViewer"></div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
