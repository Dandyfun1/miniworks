<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>My Dashboard</h1>

<div class="controls">
<button id="themeToggle">🌙 / ☀️</button>
<input type="file" id="bgUpload" accept="image/*">
</div>
</header>

<main>

<div class="top-widgets">

<div class="widget" id="clockIcon">🕒 Clock</div>
<div class="widget" id="calendarIcon">📅 Calendar</div>
<div class="widget" id="weatherIcon">🌦 Weather</div>

</div>

<div class="file-section">

<h2>File Upload & Preview</h2>

<input type="file" id="fileUpload" multiple>

<div id="filePreview"></div>

<div class="gdocs">
<h3>Add Google Doc / Slides link</h3>
<input type="text" id="gdocLink" placeholder="Paste Google Docs / Slides link">
<button id="addGdoc">Add</button>
<div id="gdocContainer"></div>
</div>

</div>

</main>

<!-- CLOCK POPUP -->

<div class="popup" id="clockPopup">

<h2>Clock</h2>

<div id="digitalClock"></div>

<canvas id="analogClock" width="200" height="200"></canvas>

<button class="close">Close</button>

</div>

<!-- CALENDAR POPUP -->

<div class="popup" id="calendarPopup">

<h2>Calendar</h2>

<div id="calendar"></div>

<input type="date" id="eventDate">
<input type="text" id="eventText" placeholder="Event name">
<button id="addEvent">Add Event</button>

<ul id="eventList"></ul>

<button class="close">Close</button>

</div>

<!-- WEATHER POPUP -->

<div class="popup" id="weatherPopup">

<h2>Weather - Vitoria-Gasteiz</h2>

<div id="weather"></div>

<button class="close">Close</button>

</div>

<script src="script.js"></script>

</body>
</html>
