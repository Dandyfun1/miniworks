<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<h1>Smart Dashboard</h1>

<div class="top-controls">

<button id="themeToggle">Toggle Theme</button>

<label class="upload-bg">
Background
<input type="file" id="bgUpload" accept="image/*">
</label>

</div>

</header>

<div class="grid" id="widgetGrid">

<div class="widget draggable" id="clockWidget">

<h3>Clock</h3>

<canvas id="clockCanvas" width="200" height="200"></canvas>

<div id="digitalClock"></div>

</div>

<div class="widget draggable" id="weatherWidget">

<h3>Weather</h3>

<div id="weather"></div>

</div>

<div class="widget draggable" id="calendarWidget">

<h3>Calendar</h3>

<div class="calendar-controls">

<button id="prevMonth">◀</button>

<span id="monthYear"></span>

<button id="nextMonth">▶</button>

</div>

<div id="calendar"></div>

<input type="date" id="eventDate">
<input type="text" id="eventText" placeholder="Event">

<button id="addEvent">Add Event</button>

<ul id="eventList"></ul>

</div>

<div class="widget draggable fileWidget">

<h3>Files</h3>

<div id="dropZone">Drag files here</div>

<input type="file" id="fileInput" multiple>

<div id="filePreview"></div>

<h4>Add Google Doc / Slides</h4>

<input id="docLink" placeholder="Paste link">

<button id="addDoc">Add</button>

<div id="docViewer"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
